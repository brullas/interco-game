<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Interco Game PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.screen {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

h1 {
  font-size: 40px;
}

.letra {
  font-size: 90px;
  margin: 20px;
}

input {
  padding: 10px;
  font-size: 18px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 18px;
  cursor: pointer;
}

/* barra progreso */
.progress {
  width: 80%;
  height: 20px;
  background: #333;
  margin: auto;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: limegreen;
}

/* animaciones */
.correct {
  color: lime;
  animation: flash 0.3s;
}

.wrong {
  color: red;
  animation: shake 0.3s;
}

@keyframes flash {
  0% {transform: scale(1);}
  50% {transform: scale(1.2);}
  100% {transform: scale(1);}
}

@keyframes shake {
  0% {transform: translateX(0);}
  25% {transform: translateX(-5px);}
  50% {transform: translateX(5px);}
  75% {transform: translateX(-5px);}
  100% {transform: translateX(0);}
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio" class="screen active">
  <h1>🚨 Interco Game</h1>
  <button onclick="iniciarJuego()">Jugar</button>
</div>

<!-- JUEGO -->
<div id="juego" class="screen">
  <h2>Tiempo: <span id="tiempo">60</span>s</h2>
  <h3>Vidas: <span id="vidas">5</span> ❤️</h3>

  <div class="progress">
    <div id="barra" class="progress-bar"></div>
  </div>

  <div id="letra" class="letra">A</div>

  <input id="respuesta" placeholder="Código..." />
  <br>
  <button onclick="comprobar()">Comprobar</button>

  <p id="resultado"></p>
</div>

<!-- FINAL -->
<div id="final" class="screen">
  <h1>🏆 Fin del juego</h1>
  <p>Puntuación: <span id="scoreFinal"></span></p>

  <input id="nombre" placeholder="Tu nombre" />
  <br>
  <button onclick="guardarScore()">Guardar</button>

  <h2>Ranking</h2>
  <ul id="ranking"></ul>

  <button onclick="volverInicio()">Volver</button>
</div>

<script>
const codigos = {
  A:"ALFA",B:"BRAVO",C:"CHARLIE",D:"DELTA",E:"ECHO",
  F:"FOXTROT",G:"GOLF",H:"HOTEL",I:"INDIA",J:"JULIET",
  K:"KILO",L:"LIMA",M:"MIKE",N:"NOVEMBER",O:"OSCAR",
  P:"PAPA",Q:"QUEBEC",R:"ROMEO",S:"SIERRA",T:"TANGO",
  U:"UNIFORM",V:"VICTOR",W:"WHISKEY",X:"XRAY",
  Y:"YANKEE",Z:"ZULU"
};

let letrasPendientes, letraActual;
let vidas, tiempo, puntos, timer;

function cambiarPantalla(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function iniciarJuego() {
  letrasPendientes = Object.keys(codigos);
  vidas = 5;
  tiempo = 60;
  puntos = 0;

  document.getElementById("vidas").textContent = vidas;
  document.getElementById("tiempo").textContent = tiempo;

  cambiarPantalla("juego");
  nuevaLetra();

  timer = setInterval(() => {
    tiempo--;
    document.getElementById("tiempo").textContent = tiempo;

    if (tiempo <= 0) terminarJuego();
  }, 1000);
}

function nuevaLetra() {
  if (letrasPendientes.length === 0) return terminarJuego();

  let i = Math.floor(Math.random() * letrasPendientes.length);
  letraActual = letrasPendientes[i];

  document.getElementById("letra").textContent = letraActual;
  document.getElementById("respuesta").value = "";

  actualizarBarra();
}

function comprobar() {
  let input = document.getElementById("respuesta");
  let res = input.value.toUpperCase().trim();
  let correcto = codigos[letraActual];
  let resultado = document.getElementById("resultado");

  resultado.className = "";

  if (res === correcto) {
    resultado.textContent = "✔ Correcto";
    resultado.classList.add("correct");
    puntos++;
    letrasPendientes = letrasPendientes.filter(l => l !== letraActual);
  } else {
    resultado.textContent = "✖ Era " + correcto;
    resultado.classList.add("wrong");
    vidas--;
    document.getElementById("vidas").textContent = vidas;
  }

  if (vidas <= 0) terminarJuego();

  nuevaLetra();
}

function actualizarBarra() {
  let progreso = (1 - letrasPendientes.length / 26) * 100;
  document.getElementById("barra").style.width = progreso + "%";
}

function terminarJuego() {
  clearInterval(timer);
  document.getElementById("scoreFinal").textContent = puntos;
  cambiarPantalla("final");
  mostrarRanking();
}

function guardarScore() {
  let nombre = document.getElementById("nombre").value || "Anon";
  let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

  ranking.push({nombre, puntos});
  ranking.sort((a,b) => b.puntos - a.puntos);
  ranking = ranking.slice(0,5);

  localStorage.setItem("ranking", JSON.stringify(ranking));
  mostrarRanking();
}

function mostrarRanking() {
  let lista = document.getElementById("ranking");
  lista.innerHTML = "";

  let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

  ranking.forEach(r => {
    let li = document.createElement("li");
    li.textContent = r.nombre + " - " + r.puntos;
    lista.appendChild(li);
  });
}

function volverInicio() {
  cambiarPantalla("inicio");
}
</script>

</body>
</html>
